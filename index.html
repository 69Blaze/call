<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Call & Screen Share</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; margin: 0; padding: 20px; }
        #setup, #room { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 500px; }
        .hidden { display: none; }
        video { width: 100%; border-radius: 8px; background: #000; margin-top: 10px; transform: scaleX(-1); }
        .controls { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: #007bff; color: white; font-weight: bold; }
        button:hover { background: #0056b3; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; width: 80%; }
        .room-info { font-weight: bold; font-size: 1.2em; color: #28a745; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Video hovor</h1>
        <button onclick="createRoom()">Vytvořit místnost</button>
        <p>nebo</p>
        <input type="text" id="joinId" placeholder="Zadejte 6-místný kód">
        <button onclick="joinRoom()">Připojit se</button>
    </div>

    <div id="room" class="hidden">
        <div class="room-info">Kód místnosti: <span id="displayId"></span></div>
        
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline style="width: 30%;"></video>

        <div class="controls">
            <button onclick="toggleScreenShare()" id="shareBtn">Sdílet obrazovku</button>
            <button onclick="location.reload()" style="background: #dc3545;">Odpojit</button>
        </div>
    </div>

    <script>
        let peer;
        let localStream;
        let screenStream;
        let currentCall;

        // Funkce pro generování 6-místného kódu
        function generateId() {
            return Math.random().toString(36).substring(2, 8);
        }

        // Inicializace Peeru
        function initPeer(id) {
            peer = new Peer(id);
            
            peer.on('open', (id) => {
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('room').classList.remove('hidden');
                document.getElementById('displayId').innerText = id;
            });

            // Přijetí hovoru
            peer.on('call', async (call) => {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = stream;
                localStream = stream;
                
                call.answer(stream);
                handleCall(call);
            });
        }

        async function createRoom() {
            const id = generateId();
            initPeer(id);
        }

        async function joinRoom() {
            const id = document.getElementById('joinId').value;
            if (id.length !== 6) return alert("Zadej platný 6-místný kód!");
            
            initPeer(generateId()); // Vytvoříme vlastní ID pro připojujícího

            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = stream;
            localStream = stream;

            const call = peer.call(id, stream);
            handleCall(call);
        }

        function handleCall(call) {
            currentCall = call;
            call.on('stream', (remoteStream) => {
                document.getElementById('remoteVideo').srcObject = remoteStream;
            });
        }

        async function toggleScreenShare() {
            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const videoTrack = screenStream.getVideoTracks()[0];
                
                // Nahrazení videa v probíhajícím hovoru
                if (currentCall) {
                    const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                    sender.replaceTrack(videoTrack);
                }

                document.getElementById('localVideo').srcObject = screenStream;

                // Návrat ke kameře po ukončení sdílení
                videoTrack.onended = () => {
                    const cameraTrack = localStream.getVideoTracks()[0];
                    const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                    sender.replaceTrack(cameraTrack);
                    document.getElementById('localVideo').srcObject = localStream;
                };
            } catch (err) {
                console.error("Chyba při sdílení obrazovky: " + err);
            }
        }
    </script>
</body>
</html>
